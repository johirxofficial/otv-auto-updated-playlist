name: OTV Playlist Auto Updater

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Unzip Secure Script
      env:
        ZIP_PASS: ${{ secrets.ZIP_PASSWORD }}
      run: |
        sudo apt-get install -y unzip
        unzip -P "$ZIP_PASS" main.py.zip

    - name: Execute Sync
      run: python main.py

    - name: Secure Cleanup
      run: rm -f main.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if [ -f otv.m3u ]; then
          git add otv.m3u
          git diff-index --quiet HEAD || git commit -m "OTV Playlist Auto Update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          git push
        else
          echo "Error: Output file otv.m3u not found! Build failed."
          exit 1
        fi
